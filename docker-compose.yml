services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
      - qgis-server
    restart: unless-stopped

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-fiberline}:${POSTGRES_PASSWORD:-fiberline}@db:5432/${POSTGRES_DB:-fiberline}
      CORS_ORIGINS: http://localhost:80,http://127.0.0.1:80,http://frontend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./public/gis:/app/public/gis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiberline}
      POSTGRES_USER: ${POSTGRES_USER:-fiberline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fiberline}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qgis-server:
    image: qgis/qgis-server:latest
    environment:
      QGIS_PROJECT_FILE: /data/project.qgs
      QGIS_SERVER_LOG_LEVEL: 2
    volumes:
      - ./public/gis:/data:ro
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  postgres_data:
